# KafScale Local Development Platform
# ====================================
# Uses images from local registry at 192.168.0.131:5100
#
# Usage:
#   cd deploy/docker-compose
#   docker-compose up -d
#
# Services:
#   - etcd:        http://localhost:2379
#   - minio:       http://localhost:9000 (console: http://localhost:9001)
#   - broker:      localhost:9092
#   - lfs-proxy:   localhost:9092 (kafka), http://localhost:8080 (HTTP API)
#   - console:     http://localhost:3080
#
# Test LFS upload:
#   curl -X POST http://localhost:8080/lfs/produce \
#     -H "X-Kafka-Topic: test-topic" \
#     -H "Content-Type: application/octet-stream" \
#     --data-binary @myfile.bin

x-registry: &registry "192.168.0.131:5100"
x-tag: &tag "dev"

services:
  # ==========================================================================
  # Infrastructure
  # ==========================================================================

  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: kafscale-etcd-dc
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd0=http://etcd:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=kafscale-local
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafscale

  minio:
    image: minio/minio:latest
    container_name: kafscale-minio-dc
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafscale

  minio-init:
    image: minio/mc:latest
    container_name: kafscale-minio-init-dc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/kafscale --ignore-existing;
      mc anonymous set download local/kafscale;
      echo 'Bucket kafscale created';
      exit 0;
      "
    networks:
      - kafscale

  # ==========================================================================
  # KafScale Platform
  # ==========================================================================

  broker:
    image: ${REGISTRY:-192.168.0.131:5100}/kafscale/kafscale-broker:${TAG:-dev}
    container_name: kafscale-broker-dc
    depends_on:
      etcd:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      KAFSCALE_BROKER_ID: "0"
      KAFSCALE_BROKER_ADDR: ":9092"
      KAFSCALE_BROKER_HOST: "broker"
      KAFSCALE_BROKER_PORT: "9092"
      KAFSCALE_BROKER_ETCD_ENDPOINTS: "http://etcd:2379"
      KAFSCALE_BROKER_DATA_DIR: "/data"
      KAFSCALE_BROKER_LOG_LEVEL: "info"
      # S3 settings (broker uses KAFSCALE_S3_* not KAFSCALE_BROKER_S3_*)
      KAFSCALE_S3_BUCKET: "kafscale"
      KAFSCALE_S3_REGION: "us-east-1"
      KAFSCALE_S3_ENDPOINT: "http://minio:9000"
      KAFSCALE_S3_ACCESS_KEY: "minioadmin"
      KAFSCALE_S3_SECRET_KEY: "minioadmin"
      KAFSCALE_S3_PATH_STYLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - broker-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kafscale

  # NOTE: The standalone lfs-proxy service has been removed.
  # LFS is now a feature-flag on the unified proxy:
  #   KAFSCALE_PROXY_LFS_ENABLED=true
  # See the proxy service above for configuration.

  console:
    image: ${REGISTRY:-192.168.0.131:5100}/kafscale/kafscale-console:${TAG:-dev}
    container_name: kafscale-console-dc
    depends_on:
      etcd:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      KAFSCALE_CONSOLE_HTTP_ADDR: ":3080"
      KAFSCALE_CONSOLE_ETCD_ENDPOINTS: "http://etcd:2379"
      KAFSCALE_CONSOLE_BROKER_METRICS_URL: "http://broker:8080/metrics"
      KAFSCALE_CONSOLE_LOG_LEVEL: "info"
      KAFSCALE_UI_USERNAME: "kafscaleadmin"
      KAFSCALE_UI_PASSWORD: "kafscale"
      # Traceability (LFS Console Dashboard)
      KAFSCALE_CONSOLE_LFS_ENABLED: "true"
      KAFSCALE_CONSOLE_KAFKA_BROKERS: "broker:9092"
      KAFSCALE_LFS_TRACKER_TOPIC: "__lfs_ops_state"
      KAFSCALE_CONSOLE_LFS_S3_BUCKET: "kafscale"
      KAFSCALE_CONSOLE_LFS_S3_REGION: "us-east-1"
      KAFSCALE_CONSOLE_LFS_S3_ENDPOINT: "http://minio:9000"
      KAFSCALE_CONSOLE_LFS_S3_ACCESS_KEY: "minioadmin"
      KAFSCALE_CONSOLE_LFS_S3_SECRET_KEY: "minioadmin"
      KAFSCALE_CONSOLE_LFS_S3_PRESIGN_TTL: "300"
    ports:
      - "3080:3080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafscale

  # ==========================================================================
  # E72 Browser LFS SDK Demo
  # ==========================================================================

  e72-browser-demo:
    image: ${REGISTRY:-192.168.0.131:5100}/kafscale/kafscale-e72-browser-demo:${TAG:-dev}
    container_name: kafscale-e72-demo-dc
    depends_on:
      proxy:
        condition: service_healthy
    ports:
      - "3072:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/index.html || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - kafscale

  # ==========================================================================
  # Optional: Operator (for local testing only - normally runs in K8s)
  # ==========================================================================

  # operator:
  #   image: ${REGISTRY:-192.168.0.131:5100}/kafscale/kafscale-operator:${TAG:-dev}
  #   container_name: kafscale-operator-dc
  #   depends_on:
  #     etcd:
  #       condition: service_healthy
  #   environment:
  #     KAFSCALE_OPERATOR_ETCD_ENDPOINTS: "http://etcd:2379"
  #     KAFSCALE_OPERATOR_BROKER_IMAGE: "${REGISTRY:-192.168.0.131:5100}/kafscale/kafscale-broker:${TAG:-dev}"
  #     KAFSCALE_OPERATOR_LOG_LEVEL: "info"
  #   networks:
  #     - kafscale

volumes:
  etcd-data:
  minio-data:
  broker-data:

networks:
  kafscale:
    driver: bridge
