imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

operator:
  replicaCount: 1
  image:
    repository: ghcr.io/kafscale/kafscale-operator
    tag: ""
    useLatest: false
    pullPolicy: IfNotPresent
  brokerImage:
    repository: ghcr.io/kafscale/kafscale-broker
    tag: ""
    useLatest: false
  etcdSnapshotEtcdctlImage:
    repository: ghcr.io/kafscale/kafscale-etcd-tools
    tag: ""
    useLatest: false
  etcdReplicas: 3
  etcdStorageSize: ""
  etcdStorageClass: ""
  etcdStorageMemory: false
  etcdEndpoints:
    - "http://etcd:2379"
  leaderKey: "kafscale-operator"
  acl:
    enabled: false
    configJson: ""
    configFile: ""
    failOpen: false
  auth:
    principalSource: ""
    proxyProtocol: false
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  metrics:
    enabled: true
    port: 8080
    service:
      annotations: {}
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      labels: {}
    prometheusRule:
      enabled: false
      labels: {}

console:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/kafscale/kafscale-console
    tag: ""
    useLatest: false
    pullPolicy: IfNotPresent
  auth:
    username: ""
    password: null  # Set via --set or use existingSecret
  etcdEndpoints: []
  etcd:
    existingSecret: ""  # Name of existing Secret with ETCD_USERNAME and ETCD_PASSWORD keys
    username: ""
    password: null  # Set via --set or use existingSecret
  metrics:
    brokerMetricsURL: ""
    operatorMetricsURL: ""
  # LFS Dashboard configuration
  lfs:
    enabled: false
    kafkaBrokers: []  # Kafka brokers for consuming tracker events
    trackerTopic: "__lfs_ops_state"
    s3:
      bucket: ""
      region: "us-east-1"
      endpoint: ""
      accessKey: ""
      secretKey: ""
      presignTTL: 300
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: console.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

proxy:
  enabled: false
  replicaCount: 2
  image:
    repository: ghcr.io/kafscale/kafscale-proxy
    tag: ""
    useLatest: false
    pullPolicy: IfNotPresent
  health:
    enabled: true
    port: 9094
  backendCacheTTLSeconds: 60
  advertisedHost: ""
  advertisedPort: 9092
  etcdEndpoints: []
  etcd:
    existingSecret: ""  # Name of existing Secret with ETCD_USERNAME and ETCD_PASSWORD keys
    username: ""
    password: null  # Set via --set or use existingSecret
  backends: []
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    type: LoadBalancer
    port: 9092
    annotations: {}
    loadBalancerSourceRanges: []

# NOTE: The standalone lfs-proxy has been removed.
# LFS is now a feature-flag on the unified proxy: set proxy.lfs.enabled=true.
# See proxy values above for LFS configuration.

lfsDemos:
  enabled: false
  e72Browser:
    enabled: true  # Browser LFS SDK demo
    lfsProxyEndpoint: ""  # Auto-detected from cluster if empty
    defaultTopic: browser-uploads
    image:
      repository: ghcr.io/kafscale/kafscale-e72-browser-demo
      tag: ""
      useLatest: false
      pullPolicy: IfNotPresent
    service:
      type: NodePort
      port: 80
      nodePort: 30072
    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts:
        - host: lfs-demo.local
          paths:
            - path: /
              pathType: Prefix
      tls: []

mcp:
  enabled: false
  namespace:
    name: kafscale-mcp
    create: true
  replicaCount: 1
  image:
    repository: ghcr.io/kafscale/kafscale-mcp
    tag: ""
    useLatest: false
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: ""
  auth:
    token: ""
  etcdEndpoints: []
  etcd:
    existingSecret: ""  # Name of existing Secret with ETCD_USERNAME and ETCD_PASSWORD keys
    username: ""
    password: null  # Set via --set or use existingSecret
  metrics:
    brokerMetricsURL: ""
  sessionTimeout: ""
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: mcp.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
